<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>图形学作业提交 | CG Homework Submission</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body{background:#f7f9fc}
    .container-narrow{max-width:960px}
    .card-custom{border:none;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,.06)}
    .tab-btn{min-width:160px}
    .section-title{font-weight:700}
    .required::after{content:" *";color:#dc3545}
    .form-help{font-size:.9rem;color:#6c757d}
    .btn-primary-soft{background:#eef6ff;color:#0d6efd;border:1px solid transparent}
    .btn-primary-soft:hover,.btn-primary-soft:focus,.btn-primary-soft.active{background:#0d6efd;color:#fff}
    .badge-soft{background:#eef2f7;color:#6c757d}
    .preview-area{white-space:pre-wrap}
    .course-info-list{list-style:none;padding-left:0}
    .course-info-list li{margin-bottom:0.5rem}
    /* 链接默认无下划线 */
    a {
        text-decoration: none;
    }
    /* 链接悬停时显示下划线 */
    a:hover {
        text-decoration: underline;
    }
    @media (max-width: 576px) {
      #top-tabs .d-flex{flex-direction:column;gap:.75rem}
      #top-tabs .tab-btn{width:100%}
      #top-tabs .ms-auto{margin-left:0 !important}
    }
  </style>
</head>
<body>
  <div class="container container-narrow py-4">
    <div class="d-flex align-items-center mb-3">
      <i class="bi bi-laptop text-primary me-2" style="font-size:1.5rem"></i>
      <h3 class="mb-0">图形学作业提交</h3>
      <span class="badge badge-soft ms-3">Computer Graphics</span>
      <a href="/cg/" class="ms-auto btn btn-outline-secondary btn-sm"><i class="bi bi-house-door"></i> 返回课程主页</a>
    </div>

    <div class="card card-custom p-4 mb-3">
      <h5 class="section-title mb-3"><i class="bi bi-info-circle text-primary me-1"></i> 课程信息</h5>
      <ul class="course-info-list">
        <li><strong>课程名称：</strong>计算机图形学</li>
        <li><strong>授课教师：</strong><a href="https://zhanghongwen.cn" target="_blank">张鸿文</a></li>
        <li><strong>课程助教：</strong>课题组在读研究生</li>
      </ul>
    </div>

    <div class="card card-custom p-4">
      <h5 class="section-title mb-3"><i class="bi bi-file-earmark-text text-primary me-1"></i> 作业提交</h5>
      <div class="mb-3" style="height:75vh">
        <iframe src="https://bnu-3dv-lab.feishu.cn/share/base/form/shrcnGWOt6vcHFHsRN0QQp376ae" title="图形学作业提交表" style="width:100%;height:100%;border:0" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>
  </div>

  <div class="modal fade" id="previewModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-eye"></i> 预览</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="previewContent" class="preview-area"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary" id="btn-copy"><i class="bi bi-clipboard"></i> 复制到剪贴板</button>
          <button class="btn btn-primary" id="btn-mail"><i class="bi bi-envelope"></i> 发送邮件</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<a ><img style="height:0;" src="//www.clustrmaps.com/map_v2.png?d=BXQ58F8bS9rau1y_-RgqipJX-3Yhu3Osuh_9FkqiUvk&cl=ffffff"/></a>

</body>
</html>
