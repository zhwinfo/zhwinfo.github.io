<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>China3DV 2026 嘉宾展示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1a56db',
                        secondary: '#e2e8f0',
                        dark: '#1e293b',
                        light: '#f8fafc',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        kai: ['KaiTi', '楷体', 'STKaiti', '华文楷体', 'serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .aspect-19-6 {
                aspect-ratio: 19/6;
            }
            .text-shadow {
                text-shadow: 0 2px 4px rgba(255,255,255,0.3);
            }
            .text-shadow-lg {
                text-shadow: 0 4px 8px rgba(255,255,255,0.5);
            }
        }
    </style>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #000;
        }
        
        /* 背景图样式 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #000;
            z-index: -1;
        }
        
        /* 全屏模式 */
        :fullscreen {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        
        :fullscreen body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        /* 全屏模式下的背景图片 */
        :fullscreen .fullscreen-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #000;
            z-index: -1;
        }
        
        /* 全屏模式下的内容容器 */
        :fullscreen .content-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        /* 16:9比例的内容区域 */
        :fullscreen .content-16-9 {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: center;
        }
        
        /* 全屏模式下隐藏其他元素 */
        :fullscreen .non-fullscreen {
            display: none !important;
        }
        
        :fullscreen #slidesContainer {
            width: 100%;
            height: 100%;
            border-radius: 0;
            box-shadow: none;
            display: flex;
            align-items: stretch;
            justify-content: stretch;
            margin-top: 0 !important;
        }
        
        :fullscreen .slide {
            width: 100%;
            height: 100%;
            display: flex !important;
            flex-direction: column !important;
            align-items: stretch !important;
            justify-content: center !important;
            margin: 0 !important;
            padding: 0.5vmin !important;
            box-sizing: border-box;
        }
        
        :fullscreen .slide:nth-child(1) {
            /* 第一页：所有嘉宾概览 */
            display: flex !important;
            flex-direction: column !important;
            align-items: stretch !important;
            justify-content: center !important;
        }
        
        :fullscreen .slide:not(:nth-child(1)) {
            /* 后续页面：单个嘉宾详情 */
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            justify-content: center !important;
        }
        
        :fullscreen .slide .w-full {
            width: 100% !important;
        }
        
        :fullscreen .slide .md\:w-1\/3 {
            width: 33.333333% !important;
        }
        
        :fullscreen .slide .md\:w-2\/3 {
            width: 66.666667% !important;
        }
        
        :fullscreen .guests-row {
            display: flex;
            flex-wrap: nowrap;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.2vmin;
            width: 100%;
            max-width: 100%;
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        
        :fullscreen .guest-item {
            flex: 1 1 0;
            min-width: 10vmin;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            height: 100%;
        }
        
        :fullscreen .guest-item .photo-container {
            width: 100%;
            height: 80%;
            aspect-ratio: 3/4;
            overflow: hidden;
            border-radius: 0.5vmin;
            box-shadow: 0 0 1vmin rgba(0, 0, 0, 0.3);
            border: 0.2vmin solid white;
        }
        
        :fullscreen .guest-item .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        
        :fullscreen .guest-item h3 {
            font-size: 1.8vmin !important;
            margin: 0.5vmin 0;
            word-wrap: break-word;
            text-align: center;
        }
        
        :fullscreen .guest-item p {
            font-size: 1.5vmin !important;
            margin: 0;
            word-wrap: break-word;
            text-align: center;
        }
        
        :fullscreen h2 {
            font-size: 4vmin !important;
            text-align: center;
        }
        
        :fullscreen h3 {
            font-size: 3vmin !important;
        }
        
        :fullscreen h4 {
            font-size: 2.5vmin !important;
        }
        
        :fullscreen p {
            font-size: 2vmin !important;
        }
        
        :fullscreen li {
            font-size: 2vmin !important;
        }
        
        /* 所有嘉宾显示的样式 */
        .guests-row {
            display: flex;
            flex-wrap: nowrap;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.5rem;
            width: 100%;
            max-width: 100vw;
            padding: 5px 0;
            box-sizing: border-box;
        }
        
        .guest-item {
            flex: 1;
            min-width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .guest-item .photo-container {
            width: 100%;
            aspect-ratio: 3/4;
            max-width: 120px;
            max-height: 160px;
        }
    </style>
</head>
<body>
    <!-- 全屏模式下的背景元素 -->
    <div class="fullscreen-bg"></div>
    
    <!-- 内容容器 -->
    <div class="content-container">
        <div class="content-16-9">
            <!-- 幻灯片容器 -->
            <div id="slidesContainer" class="relative overflow-hidden aspect-19-6 rounded-xl shadow-2xl mx-1 md:mx-2 w-full mt-32 md:mt-40">
                <!-- 幻灯片将通过JavaScript动态生成 -->
            </div>

            <!-- 分页指示器 -->
            <div id="pagination" class="flex justify-center mt-16 space-x-2 non-fullscreen">
                <!-- 分页指示器将通过JavaScript动态生成 -->
            </div>

            <!-- 控制按钮 -->
            <div class="container mx-auto px-4 py-16 non-fullscreen">
                <div class="flex flex-col md:flex-row justify-center items-center mb-8 space-y-4 md:space-y-0 md:space-x-4">
                    <div class="w-full md:w-auto">
                        <label for="forumSelect" class="block text-sm font-medium text-gray-700 mb-1">选择论坛：</label>
                        <select id="forumSelect" class="bg-white border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary">
                            <option value="all">所有论坛</option>
                            <!-- 论坛选项将通过JavaScript动态生成 -->
                        </select>
                    </div>
                    <div class="w-full md:w-auto">
                        <label for="fileInput" class="block text-sm font-medium text-gray-700 mb-1">选择YAML文件：</label>
                        <input type="file" id="fileInput" accept=".yaml,.yml" class="bg-white border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                    <div class="flex space-x-4">
                        <button id="prevBtn" class="bg-primary text-white px-6 py-3 rounded-lg hover:bg-primary/90 transition-all flex items-center shadow-lg">
                            <i class="fa fa-chevron-left mr-2"></i> 上一页
                        </button>
                        <button id="fullscreenBtn" class="bg-secondary text-dark px-6 py-3 rounded-lg hover:bg-secondary/80 transition-all flex items-center shadow-lg">
                            <i class="fa fa-expand mr-2"></i> 全屏模式
                        </button>
                        <button id="nextBtn" class="bg-primary text-white px-6 py-3 rounded-lg hover:bg-primary/90 transition-all flex items-center shadow-lg">
                            下一页 <i class="fa fa-chevron-right ml-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 嘉宾数据
        let guests = [];
        let filteredGuests = [];
        let currentForum = 'all';

        // 当前幻灯片索引
        let currentSlide = 0;

        // 预加载图片
        function preloadImages(guests) {
            guests.forEach(guest => {
                if (guest.photo && guest.photo.startsWith('http')) {
                    const img = new Image();
                    img.src = guest.photo;
                    img.onerror = function() {
                        console.log(`Failed to load image: ${guest.photo}`);
                    };
                }
            });
        }

        // 初始化页面
        async function init() {
            try {
                const response = await fetch('./guests.yaml');
                const text = await response.text();
                const data = parseYAML(text);
                
                guests = [];
                data.forums.forEach(forum => {
                    forum.speakers.forEach(speaker => {
                        guests.push({
                            ...speaker,
                            forum: forum.name,
                            workshop_questions: forum.workshop_questions
                        });
                    });
                });
                
                filteredGuests = [...guests];
                generateForumOptions();
                
                // 预加载图片
                preloadImages(guests);
            } catch (error) {
                console.error('Failed to load guests.yaml:', error);
                guests = [
                    {
                        "name": "苏昊",
                        "unit": "Hillbot",
                        "title": "待更新",
                        "photo": "http://china3dv.csig.org.cn/img/guest_pics/haosu.jpg",
                        "forum": "Keynote-1",
                        "workshop_questions": []
                    }
                ];
                filteredGuests = [...guests];
            }
            renderSlides();
            renderPagination();
            updateSlide();
        }

        // 改进的YAML解析函数
        function parseYAML(text) {
            const lines = text.trim().split('\n');
            const result = { forums: [] };
            let currentForum = null;
            let currentSpeaker = null;
            let inSpeakers = false;
            let inWorkshopQuestions = false;
            
            for (const line of lines) {
                const trimmedLine = line.trim();
                if (trimmedLine === '' || trimmedLine.startsWith('#')) {
                    continue;
                }
                
                if (trimmedLine.startsWith('- name:') && (line.startsWith('  - name:') || line.startsWith('- name:'))) {
                    if (currentForum) {
                        if (currentSpeaker) {
                            currentForum.speakers.push(currentSpeaker);
                            currentSpeaker = null;
                        }
                        result.forums.push(currentForum);
                    }
                    currentForum = {
                        name: trimmedLine.substring(7).trim(),
                        workshop_questions: [],
                        speakers: []
                    };
                    inSpeakers = false;
                    inWorkshopQuestions = false;
                }
                else if (trimmedLine === 'workshop_questions:') {
                    inWorkshopQuestions = true;
                    inSpeakers = false;
                }
                else if (trimmedLine === 'speakers:') {
                    inSpeakers = true;
                    inWorkshopQuestions = false;
                }
                else if (inWorkshopQuestions && trimmedLine.startsWith('- ')) {
                    let question = trimmedLine.substring(2).trim();
                    if ((question.startsWith('"') && question.endsWith('"')) || (question.startsWith("'") && question.endsWith("'"))) {
                        question = question.substring(1, question.length - 1);
                    }
                    if (currentForum) {
                        currentForum.workshop_questions.push(question);
                    }
                }
                else if (inSpeakers && trimmedLine.startsWith('- name:')) {
                    if (currentSpeaker) {
                        currentForum.speakers.push(currentSpeaker);
                    }
                    currentSpeaker = {
                        name: trimmedLine.substring(7).trim()
                    };
                }
                else if (inSpeakers && currentSpeaker && trimmedLine.includes(':')) {
                    const colonIndex = trimmedLine.indexOf(':');
                    const key = trimmedLine.substring(0, colonIndex).trim();
                    let value = trimmedLine.substring(colonIndex + 1).trim();
                    if ((value.startsWith('"') && value.endsWith('"')) || (value.startsWith("'") && value.endsWith("'"))) {
                        value = value.substring(1, value.length - 1);
                    }
                    currentSpeaker[key] = value;
                }
            }
            
            if (currentForum) {
                if (currentSpeaker) {
                    currentForum.speakers.push(currentSpeaker);
                }
                result.forums.push(currentForum);
            }
            
            return result;
        }

        // 生成论坛选择选项
        function generateForumOptions() {
            const forumSelect = document.getElementById('forumSelect');
            // 提取所有唯一的论坛名称
            const forums = [...new Set(guests.map(guest => guest.forum).filter(Boolean))];
            // 清空现有选项（保留"所有论坛"）
            while (forumSelect.options.length > 1) {
                forumSelect.remove(1);
            }
            // 添加论坛选项
            forums.forEach(forum => {
                const option = document.createElement('option');
                option.value = forum;
                option.textContent = forum;
                forumSelect.appendChild(option);
            });
            // 确保事件监听器只绑定一次
            if (!forumSelect.__hasEventListener) {
                forumSelect.addEventListener('change', function() {
                    currentForum = this.value;
                    filterGuests();
                });
                forumSelect.__hasEventListener = true;
            }
        }

        // 过滤嘉宾
        function filterGuests() {
            if (currentForum === 'all') {
                filteredGuests = [...guests];
            } else {
                filteredGuests = guests.filter(guest => guest.forum === currentForum);
            }
            currentSlide = 0;
            renderSlides();
            renderPagination();
            updateSlide();
        }

        // 渲染幻灯片
        function renderSlides() {
            const container = document.getElementById('slidesContainer');
            container.innerHTML = '';

            const allGuestsSlide = document.createElement('div');
            allGuestsSlide.className = 'slide absolute inset-0 p-8 flex flex-col items-center justify-center';
            
            const forumTitle = currentForum === 'all' ? '所有论坛' : currentForum;
            
            let guestsHtml = `
                <h2 class="text-3xl font-bold text-black text-shadow-lg mb-6">${forumTitle}</h2>
                <div class="guests-row">
            `;
            
            filteredGuests.forEach(guest => {
                // 处理图片URL
                let photoUrl = guest.photo;
                if (photoUrl && !photoUrl.startsWith('http')) {
                    // 处理相对路径
                    if (photoUrl.startsWith('/')) {
                        photoUrl = 'http://china3dv.csig.org.cn' + photoUrl;
                    } else if (photoUrl.startsWith('./')) {
                        photoUrl = 'http://china3dv.csig.org.cn' + photoUrl.substring(1);
                    }
                }
                
                guestsHtml += `
                    <div class="guest-item">
                        <div class="photo-container relative overflow-hidden rounded-lg shadow-2xl border-2 border-white mb-2">
                            <img src="${photoUrl || 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 256"><rect width="192" height="256" fill="%23f3ede2"/><circle cx="96" cy="80" r="40" fill="%23d2c09d"/><rect x="64" y="128" width="64" height="96" rx="8" fill="%23d2c09d"/><text x="96" y="232" text-anchor="middle" font-size="14" font-family="PingFang SC, Microsoft YaHei, Arial" fill="%237a6642">${guest.name}</text></svg>')}" 
                                 alt="${guest.name}" 
                                 class="w-full h-full object-cover object-center"
                                 onError="this.onerror=null; this.src='data:image/svg+xml;charset=UTF-8,' + encodeURIComponent('<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 192 256\"><rect width=\"192\" height=\"256\" fill=\"%23f3ede2\"/><circle cx=\"96\" cy=\"80\" r=\"40\" fill=\"%23d2c09d\"/><rect x=\"64\" y=\"128\" width=\"64\" height=\"96\" rx=\"8\" fill=\"%23d2c09d\"/><text x=\"96\" y=\"232\" text-anchor=\"middle\" font-size=\"14\" font-family=\"PingFang SC, Microsoft YaHei, Arial\" fill=\"%237a6642\">${guest.name}</text></svg>')">
                        </div>
                        <h3 class="font-bold text-black text-shadow text-center mb-1">${guest.name}</h3>
                        <p class="text-black text-shadow text-center">${guest.unit}</p>
                    </div>
                `;
            });
            
            guestsHtml += `
                </div>
            `;
            
            allGuestsSlide.innerHTML = guestsHtml;
            container.appendChild(allGuestsSlide);

            // 后续页面：单个嘉宾详情
            filteredGuests.forEach((guest, index) => {
                // 处理图片URL
                let photoUrl = guest.photo;
                if (photoUrl && !photoUrl.startsWith('http')) {
                    // 处理相对路径
                    if (photoUrl.startsWith('/')) {
                        photoUrl = 'http://china3dv.csig.org.cn' + photoUrl;
                    } else if (photoUrl.startsWith('./')) {
                        photoUrl = 'http://china3dv.csig.org.cn' + photoUrl.substring(1);
                    }
                }
                
                const slide = document.createElement('div');
                slide.className = 'slide absolute inset-0 p-8 flex flex-col md:flex-row items-center justify-center';
                
                slide.innerHTML = `
                    <div class="w-full md:w-1/3 flex items-center justify-center p-4 mb-6 md:mb-0">
                        <div class="relative w-72 h-96 overflow-hidden rounded-lg shadow-2xl border-4 border-white">
                            <img src="${photoUrl || 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="288" height="384" viewBox="0 0 288 384"><rect width="288" height="384" fill="%23f3ede2"/><circle cx="144" cy="120" r="60" fill="%23d2c09d"/><rect x="96" y="192" width="96" height="144" rx="12" fill="%23d2c09d"/><text x="144" y="348" text-anchor="middle" font-size="20" font-family="PingFang SC, Microsoft YaHei, Arial" fill="%237a6642">${guest.name}</text></svg>')}" 
                                 alt="${guest.name}" 
                                 class="w-full h-full object-cover object-center"
                                 onError="this.onerror=null; this.src='data:image/svg+xml;charset=UTF-8,' + encodeURIComponent('<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"288\" height=\"384\" viewBox=\"0 0 288 384\"><rect width=\"288\" height=\"384\" fill=\"%23f3ede2\"/><circle cx=\"144\" cy=\"120\" r=\"60\" fill=\"%23d2c09d\"/><rect x=\"96\" y=\"192\" width=\"96\" height=\"144\" rx=\"12\" fill=\"%23d2c09d\"/><text x=\"144\" y=\"348\" text-anchor=\"middle\" font-size=\"20\" font-family=\"PingFang SC, Microsoft YaHei, Arial\" fill=\"%237a6642\">${guest.name}</text></svg>')">
                        </div>
                    </div>
                    <div class="w-full md:w-2/3 flex flex-col items-center md:items-start text-center md:text-left">
                        <h2 class="text-5xl font-bold text-black text-shadow-lg mb-2">${guest.name}</h2>
                        <p class="text-2xl text-black text-shadow mb-6">${guest.unit}</p>
                        <h3 class="text-3xl font-semibold font-kai text-black text-shadow-lg text-center md:text-left w-full mb-4">${guest.title}</h3>
                    </div>
                `;
                container.appendChild(slide);
            });

            // 最后一页：论坛问题
            if (currentForum !== 'all' && filteredGuests.length > 0 && filteredGuests[0].workshop_questions && filteredGuests[0].workshop_questions.length > 0) {
                const questionsSlide = document.createElement('div');
                questionsSlide.className = 'slide absolute inset-0 p-8 flex flex-col items-center justify-center';
                
                questionsSlide.innerHTML = `
                    <h2 class="text-3xl font-bold text-black text-shadow-lg mb-6">${forumTitle} - 专题研讨问题</h2>
                    <div class="max-w-4xl w-full">
                        <ul class="list-disc list-inside text-xl text-black text-shadow space-y-4">
                            ${filteredGuests[0].workshop_questions.map(question => `<li>${question}</li>`).join('')}
                        </ul>
                    </div>
                `;
                container.appendChild(questionsSlide);
            }
        }

        // 渲染分页指示器
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            // 第一页是所有嘉宾，后续是单个嘉宾，最后一页是论坛问题（如果有）
            let totalSlides = 1 + filteredGuests.length;
            if (currentForum !== 'all' && filteredGuests.length > 0 && filteredGuests[0].workshop_questions && filteredGuests[0].workshop_questions.length > 0) {
                totalSlides += 1;
            }
            for (let i = 0; i < totalSlides; i++) {
                const dot = document.createElement('button');
                dot.className = `w-3 h-3 rounded-full transition-all ${i === currentSlide ? 'bg-black' : 'bg-black/50'}`;
                dot.addEventListener('click', () => {
                    currentSlide = i;
                    updateSlide();
                });
                pagination.appendChild(dot);
            }
        }

        // 更新幻灯片显示
        function updateSlide() {
            const slides = document.querySelectorAll('.slide');
            slides.forEach((slide, index) => {
                if (index === currentSlide) {
                    slide.style.display = 'flex';
                    slide.style.opacity = '1';
                } else {
                    slide.style.display = 'none';
                    slide.style.opacity = '0';
                }
            });

            // 更新分页指示器
            const dots = document.querySelectorAll('#pagination button');
            dots.forEach((dot, index) => {
                dot.className = `w-3 h-3 rounded-full transition-all ${index === currentSlide ? 'bg-black' : 'bg-black/50'}`;
            });
        }

        // 下一页
        function nextSlide() {
            let totalSlides = 1 + filteredGuests.length;
            if (currentForum !== 'all' && filteredGuests.length > 0 && filteredGuests[0].workshop_questions && filteredGuests[0].workshop_questions.length > 0) {
                totalSlides += 1;
            }
            currentSlide = (currentSlide + 1) % totalSlides;
            updateSlide();
        }

        // 上一页
        function prevSlide() {
            let totalSlides = 1 + filteredGuests.length;
            if (currentForum !== 'all' && filteredGuests.length > 0 && filteredGuests[0].workshop_questions && filteredGuests[0].workshop_questions.length > 0) {
                totalSlides += 1;
            }
            currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
            updateSlide();
        }

        // 切换全屏模式
        function toggleFullscreen() {
            const elem = document.documentElement;
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) {
                    elem.msRequestFullscreen();
                }
                document.getElementById('fullscreenBtn').innerHTML = '<i class="fa fa-compress mr-2"></i> 退出全屏';
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
                document.getElementById('fullscreenBtn').innerHTML = '<i class="fa fa-expand mr-2"></i> 全屏模式';
            }
        }

        // 事件监听器
        document.getElementById('nextBtn').addEventListener('click', nextSlide);
        document.getElementById('prevBtn').addEventListener('click', prevSlide);
        document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);

        // 文件选择事件监听器
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const text = event.target.result;
                        const data = parseYAML(text);
                        
                        guests = [];
                        data.forums.forEach(forum => {
                            forum.speakers.forEach(speaker => {
                                guests.push({
                                    ...speaker,
                                    forum: forum.name,
                                    workshop_questions: forum.workshop_questions
                                });
                            });
                        });
                        
                        filteredGuests = [...guests];
                        generateForumOptions();
                        currentSlide = 0;
                        renderSlides();
                        renderPagination();
                        updateSlide();
                        console.log('成功加载YAML文件');
                    } catch (error) {
                        console.error('解析YAML文件失败:', error);
                        alert('解析YAML文件失败，请确保文件格式正确');
                    }
                };
                reader.readAsText(file, 'utf-8');
            }
        });

        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            } else if (e.key === 'F11') {
                e.preventDefault();
                toggleFullscreen();
            }
        });

        // 监听全屏模式变化
        function handleFullscreenChange() {
            // 重新渲染幻灯片，确保布局适应新的屏幕尺寸
            renderSlides();
            updateSlide();
        }

        // 添加全屏模式变化的事件监听器
        document.addEventListener('fullscreenchange', handleFullscreenChange);
        document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
        document.addEventListener('mozfullscreenchange', handleFullscreenChange);
        document.addEventListener('MSFullscreenChange', handleFullscreenChange);

        // 初始化
        init();
    </script>
</body>
</html>
